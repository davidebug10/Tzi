<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1F3A5F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ניהול צי רכבים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap');
  :root{
    --bg:#F7F5F1; --card:#fff; --ink:#22252B; --sub:#6B7280; --line:#E7E2DA;
    --red:#C62828; --redbg:#FDECEA; --amber:#B45309; --amberbg:#FEF3E2;
    --green:#15803D; --greenbg:#EAF6EE; --navy:#1F3A5F;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Heebo","Segoe UI",-apple-system,"Arial Hebrew",Arial,sans-serif;}
  #wrap{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:80px}
  header{background:var(--navy);color:#fff;padding:16px 20px 14px;display:flex;justify-content:space-between;align-items:center}
  header h1{font-size:20px;margin:0;font-weight:800}
  header .sub{font-size:13px;opacity:.75}
  .hbtns{display:flex;align-items:center;gap:10px}
  #saveState{font-size:12px;opacity:.85;min-width:52px;text-align:left}
  .gear{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:10px;padding:8px 12px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer}
  #settings{display:none;background:#fff;border-bottom:1px solid var(--line);padding:14px 20px}
  #settings .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  #settings label{font-size:14px;font-weight:700}
  #settings .hint{font-size:13px;color:var(--sub)}
  main{padding:16px 16px 8px}
  .stack{display:flex;flex-direction:column;gap:12px}
  .card{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .b-overdue{background:var(--redbg);color:var(--red)}
  .b-warn{background:var(--amberbg);color:var(--amber)}
  .b-ok{background:var(--greenbg);color:var(--green)}
  .ev{border-right:5px solid}
  .ev.overdue{border-right-color:var(--red)}
  .ev.warn{border-right-color:var(--amber)}
  .ev.ok{border-right-color:var(--green)}
  .ev .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .ev .title{font-weight:800;font-size:16px}
  .ev .title .vname{color:var(--navy)}
  .ev .meta{font-size:13px;color:var(--sub);margin-top:2px;line-height:1.5}
  .gauge{height:8px;border-radius:999px;background:#EFEBE4;overflow:hidden;margin-top:10px}
  .gauge>div{height:100%;border-radius:999px;transition:width .4s}
  .gaugeInfo{display:flex;justify-content:space-between;margin-top:4px;font-size:12px;color:var(--sub)}
  .gaugeInfo .mid{font-weight:700}
  button{font-family:inherit;cursor:pointer}
  button:active{transform:scale(.98)}
  .btn{border:none;border-radius:10px;font-weight:700;padding:11px 16px;font-size:15px}
  .btn.sm{padding:6px 12px;font-size:13px}
  .btn.primary{background:var(--navy);color:#fff}
  .btn.danger{background:var(--redbg);color:var(--red)}
  .btn.good{background:var(--greenbg);color:var(--green)}
  .btn.ghost{background:#EFEBE4;color:var(--ink)}
  .btn.full{width:100%}
  .row{display:flex;gap:8px;align-items:center}
  .row .grow{flex:1}
  input,select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);outline:none}
  input[type=date]{direction:rtl}
  .sectionTitle{font-weight:800;font-size:15px}
  .sectionTitle.red{color:var(--red)}
  .sectionTitle.gray{color:var(--sub)}
  .notice{background:#FFF8E6;border:1.5px solid #F0DCA8;border-radius:12px;padding:10px 14px;font-size:13.5px}
  .empty{text-align:center;color:var(--sub);padding:48px 20px;line-height:1.7}
  .empty .big{font-size:40px;margin-bottom:10px}
  .vhead{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .vhead .name{font-weight:800;font-size:16px}
  .vhead .info{font-size:13px;color:var(--sub)}
  .vbody{border-top:1px solid var(--line);margin-top:12px;padding-top:14px;display:flex;flex-direction:column;gap:12px}
  .addForm{background:#FBFAF7;border:1.5px dashed var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px}
  .typeBtns{display:flex;gap:8px}
  .typeBtns button{flex:1;padding:9px 0;border-radius:10px;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-weight:700;font-size:14px}
  .typeBtns button.on{border-color:var(--navy);background:var(--navy);color:#fff}
  .lbl{font-size:13px;color:var(--sub);margin-bottom:4px}
  .linkDel{background:none;border:none;color:var(--red);font-size:13px;text-decoration:underline;padding:0;align-self:flex-start}
  nav{position:fixed;bottom:0;right:0;left:0;max-width:560px;margin:0 auto;background:#fff;border-top:1px solid var(--line);display:flex;box-shadow:0 -2px 10px rgba(0,0,0,.05)}
  nav button{flex:1;padding:12px 0 14px;border:none;background:transparent;font-weight:600;font-size:14px;color:var(--sub);border-top:3px solid transparent;position:relative}
  nav button.on{font-weight:800;color:var(--navy);border-top-color:var(--navy)}
  nav .dot{position:absolute;top:6px;margin-right:4px;background:var(--red);color:#fff;font-size:11px;font-weight:800;border-radius:999px;padding:1px 6px}
  #memWarn{display:none;background:var(--redbg);color:var(--red);font-size:13px;font-weight:700;padding:10px 16px;text-align:center}
  .weekCard{display:flex;align-items:center;gap:12px}
  .weekCard input{width:120px;text-align:center;font-weight:700}
  .weekCard .low{color:var(--red)}
</style>
</head>
<body>
<div id="wrap">
  <header>
    <div>
      <h1>ניהול צי רכבים</h1>
      <div class="sub">טיפולים · טסטים · מעקב ק"מ</div>
    </div>
    <div class="hbtns">
      <span id="saveState"></span>
      <button class="gear" onclick="toggleSettings()">⚙</button>
    </div>
  </header>

  <div id="memWarn">⚠ במצב תצוגה זה הנתונים לא נשמרים. יש לפתוח את האפליקציה מהקישור בדפדפן הטלפון.</div>

  <div id="settings">
    <div class="row" style="margin-bottom:12px">
      <label>התראה מקדימה:</label>
      <input id="warnKmInput" inputmode="numeric" style="width:110px" onchange="setWarnKm(this.value)">
      <span class="hint">ק"מ לפני האירוע</span>
    </div>
    <div class="row">
      <button class="btn ghost sm" onclick="exportBackup()">⬇ גיבוי לקובץ</button>
      <button class="btn ghost sm" onclick="document.getElementById('importFile').click()">⬆ שחזור מגיבוי</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(this)">
    </div>
    <div class="hint" style="margin-top:8px">מומלץ לשמור גיבוי אחת לחודש. הקובץ נשמר בטלפון וניתן לשחזר ממנו הכל.</div>
  </div>

  <main id="app"></main>

  <nav>
    <button id="tab-board" onclick="setTab('board')">🔔 לוח התראות<span id="alertDot"></span></button>
    <button id="tab-vehicles" onclick="setTab('vehicles')">🚗 רכבים</button>
    <button id="tab-weekly" onclick="setTab('weekly')">📋 עדכון ק"מ</button>
  </nav>
</div>

<script>
"use strict";
const KEY = "fleet-data-v1";
const WARN_DAYS = 30;
const TYPES = ["טיפול","טסט","אחר"];

// ---------- אחסון ----------
let storageOK = true;
try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); }
catch(e){ storageOK = false; document.getElementById("memWarn").style.display = "block"; }

function defaultData(){
  const v = [];
  for(let i=1;i<=8;i++) v.push({id:"v"+i, name:"רכב "+i, km:0, kmDate:null, events:[]});
  v.push({id:"r1", name:"רענן 1", km:0, kmDate:null, events:[]});
  v.push({id:"r2", name:"רענן 2", km:0, kmDate:null, events:[]});
  return {warnKm:2000, vehicles:v};
}

let data;
try { data = storageOK && localStorage.getItem(KEY) ? JSON.parse(localStorage.getItem(KEY)) : defaultData(); }
catch(e){ data = defaultData(); }

let saveTimer = null;
function save(){
  render();
  if(!storageOK) return;
  const el = document.getElementById("saveState");
  el.textContent = "שומר…";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{
      localStorage.setItem(KEY, JSON.stringify(data));
      el.textContent = "נשמר ✓";
      setTimeout(()=>{ el.textContent=""; }, 1800);
    }catch(e){ el.textContent = "שגיאת שמירה"; }
  }, 300);
}

// ---------- עזרים ----------
const fmt = n => (n===null||n===undefined||n===""||isNaN(n)) ? "—" : Number(n).toLocaleString("he-IL");
const todayISO = () => new Date().toISOString().slice(0,10);
const fmtDate = iso => iso ? new Date(iso).toLocaleDateString("he-IL",{day:"numeric",month:"numeric",year:"2-digit"}) : null;
function daysUntil(iso){
  if(!iso) return null;
  const d = new Date(iso+"T00:00:00"), now = new Date();
  now.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}
const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function status(ev, km){
  const kmLeft = (ev.dueKm!==null && ev.dueKm!==undefined) ? ev.dueKm - km : null;
  const daysLeft = ev.dueDate ? daysUntil(ev.dueDate) : null;
  let level = "ok";
  if((kmLeft!==null && kmLeft<=0)||(daysLeft!==null && daysLeft<0)) level="overdue";
  else if((kmLeft!==null && kmLeft<=data.warnKm)||(daysLeft!==null && daysLeft<=WARN_DAYS)) level="warn";
  let score = 9e9;
  if(kmLeft!==null) score = Math.min(score, kmLeft);
  if(daysLeft!==null) score = Math.min(score, daysLeft*70);
  return {kmLeft, daysLeft, level, score};
}
const LEVEL_TXT = {overdue:"עבר את המועד", warn:"מתקרב", ok:"תקין"};

// ---------- מצב תצוגה ----------
let tab = "board";
let expanded = null;
let addingFor = null;
let addType = "טיפול";
let addRepeat = "none";

function setTab(t){ tab = t; addingFor = null; render(); }
function toggleSettings(){
  const s = document.getElementById("settings");
  s.style.display = s.style.display === "block" ? "none" : "block";
  document.getElementById("warnKmInput").value = data.warnKm;
}
function setWarnKm(v){
  data.warnKm = Number(String(v).replace(/[^\d]/g,"")) || 0;
  save();
}

// ---------- פעולות ----------
function vById(id){ return data.vehicles.find(v=>v.id===id); }

function updateKm(vid){
  const inp = document.getElementById("km-"+vid);
  const val = inp.value.replace(/[^\d]/g,"");
  if(!val) return;
  const v = vById(vid);
  v.km = Number(val); v.kmDate = todayISO();
  save();
}

function markDone(vid, eid){
  const v = vById(vid);
  const ev = v.events.find(e=>e.id===eid);
  v.events = v.events.filter(e=>e.id!==eid);
  if(ev.everyKm && ev.dueKm!==null && ev.dueKm!==undefined){
    v.events.push({...ev, id:"e"+Date.now(), dueKm:v.km+ev.everyKm, baseKm:v.km});
  } else if(ev.everyYear && ev.dueDate){
    const d = new Date(ev.dueDate); d.setFullYear(d.getFullYear()+1);
    v.events.push({...ev, id:"e"+Date.now(), dueDate:d.toISOString().slice(0,10), baseKm:v.km});
  }
  save();
}

function deleteEvent(vid, eid){
  if(!confirm("למחוק את האירוע?")) return;
  const v = vById(vid);
  v.events = v.events.filter(e=>e.id!==eid);
  save();
}

function openAdd(vid){ addingFor = vid; addType = "טיפול"; addRepeat = "none"; render(); }
function pickType(t){
  addType = t;
  document.querySelectorAll(".typeBtns button").forEach(b=>b.classList.toggle("on", b.dataset.t===t));
  document.getElementById("noteWrap").style.display = t==="אחר" ? "block" : "none";
}
function pickRepeat(sel){
  addRepeat = sel.value;
  document.getElementById("everyKmWrap").style.display = addRepeat==="km" ? "block" : "none";
}
function submitAdd(vid){
  const v = vById(vid);
  const dueKm = document.getElementById("addDueKm").value.replace(/[^\d]/g,"");
  const dueDate = document.getElementById("addDueDate").value;
  const note = (document.getElementById("addNote")?.value || "").trim();
  const everyKm = document.getElementById("addEveryKm").value.replace(/[^\d]/g,"");
  if(!dueKm && !dueDate){ alert("יש להזין יעד ק\"מ או תאריך יעד"); return; }
  v.events.push({
    id:"e"+Date.now(), type:addType, note,
    dueKm: dueKm ? Number(dueKm) : null,
    dueDate: dueDate || null,
    everyKm: (addRepeat==="km" && everyKm) ? Number(everyKm) : null,
    everyYear: addRepeat==="year",
    baseKm: v.km
  });
  addingFor = null;
  save();
}

function addVehicle(){
  const inp = document.getElementById("newVehicleName");
  const name = inp.value.trim();
  if(!name) return;
  data.vehicles.push({id:"v"+Date.now(), name, km:0, kmDate:null, events:[]});
  save();
}
function removeVehicle(vid){
  const v = vById(vid);
  if(!confirm('למחוק את "'+v.name+'" כולל כל האירועים שלו?')) return;
  data.vehicles = data.vehicles.filter(x=>x.id!==vid);
  save();
}

function saveWeekly(){
  data.vehicles.forEach(v=>{
    const inp = document.getElementById("wk-"+v.id);
    if(inp && inp.value){
      v.km = Number(inp.value.replace(/[^\d]/g,""));
      v.kmDate = todayISO();
    }
  });
  save();
}

// ---------- גיבוי ----------
function exportBackup(){
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "גיבוי_צי_רכבים_"+todayISO()+".json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importBackup(input){
  const file = input.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!d || !Array.isArray(d.vehicles)) throw 0;
      if(!confirm("לשחזר מהגיבוי? הנתונים הנוכחיים יוחלפו.")) return;
      data = d;
      save();
      alert("הגיבוי שוחזר בהצלחה ✓");
    }catch(e){ alert("הקובץ אינו קובץ גיבוי תקין"); }
    input.value = "";
  };
  r.readAsText(file);
}

// ---------- רינדור ----------
function gaugeHTML(ev, km){
  if(ev.dueKm===null || ev.dueKm===undefined) return "";
  const st = status(ev, km);
  const span = Math.max(ev.dueKm - (ev.baseKm ?? Math.min(km, ev.dueKm - data.warnKm*3)), 1);
  const done = Math.min(Math.max(km - (ev.dueKm - span), 0), span);
  const pct = Math.min(done/span*100, 100);
  const color = st.level==="overdue" ? "var(--red)" : st.level==="warn" ? "var(--amber)" : "var(--green)";
  const mid = st.kmLeft<=0 ? "חריגה של "+fmt(-st.kmLeft)+' ק"מ' : "נותרו "+fmt(st.kmLeft)+' ק"מ';
  return `<div class="gauge"><div style="width:${pct}%;background:${color}"></div></div>
    <div class="gaugeInfo"><span>נוכחי: ${fmt(km)}</span><span class="mid" style="color:${color}">${mid}</span><span>יעד: ${fmt(ev.dueKm)}</span></div>`;
}

function eventCardHTML(v, ev, showName){
  const st = status(ev, v.km);
  const title = (ev.type==="אחר" && ev.note) ? esc(ev.note) : esc(ev.type);
  const meta = [];
  if(ev.dueKm!==null && ev.dueKm!==undefined) meta.push('יעד: '+fmt(ev.dueKm)+' ק"מ');
  if(ev.dueDate){
    let t = "עד "+fmtDate(ev.dueDate);
    if(st.daysLeft!==null) t += st.daysLeft<0 ? " (באיחור "+(-st.daysLeft)+" ימים)" : " (בעוד "+st.daysLeft+" ימים)";
    meta.push(t);
  }
  if(ev.everyKm) meta.push('חוזר כל '+fmt(ev.everyKm)+' ק"מ');
  if(ev.everyYear) meta.push("חוזר כל שנה");
  return `<div class="card ev ${st.level}">
    <div class="top">
      <div>
        <div class="title">${showName?'<span class="vname">'+esc(v.name)+' · </span>':''}${title}</div>
        <div class="meta">${meta.join(" · ")}</div>
      </div>
      <span class="badge b-${st.level}">${LEVEL_TXT[st.level]}</span>
    </div>
    ${gaugeHTML(ev, v.km)}
    <div class="row" style="margin-top:12px">
      <button class="btn good sm grow" onclick="markDone('${v.id}','${ev.id}')">✓ בוצע${(ev.everyKm||ev.everyYear)?" (ייקבע הבא)":""}</button>
      <button class="btn danger sm" onclick="deleteEvent('${v.id}','${ev.id}')">מחיקה</button>
    </div>
  </div>`;
}

function renderBoard(){
  const all = [];
  data.vehicles.forEach(v => v.events.forEach(ev => all.push({v, ev, st: status(ev, v.km)})));
  all.sort((a,b)=>a.st.score-b.st.score);
  const alerts = all.filter(x=>x.st.level!=="ok");
  const upcoming = all.filter(x=>x.st.level==="ok");
  const stale = data.vehicles.filter(v=>!v.kmDate || daysUntil(v.kmDate) <= -7);

  let h = '<div class="stack">';
  if(stale.length) h += `<div class="notice">📋 טרם עודכן ק"מ השבוע: ${stale.map(v=>esc(v.name)).join(", ")}</div>`;
  if(!all.length){
    h += `<div class="empty"><div class="big">🚚</div>אין עדיין אירועים במעקב.<br>עוברים ללשונית <b>רכבים</b> ומוסיפים טיפול או טסט לכל רכב.</div>`;
  }
  if(alerts.length){
    h += `<div class="sectionTitle red">דורש טיפול (${alerts.length})</div>`;
    alerts.forEach(x => h += eventCardHTML(x.v, x.ev, true));
  }
  if(upcoming.length){
    h += `<div class="sectionTitle gray" style="margin-top:6px">בהמשך (${upcoming.length})</div>`;
    upcoming.forEach(x => h += eventCardHTML(x.v, x.ev, true));
  }
  h += '</div>';
  return h;
}

function addFormHTML(v){
  return `<div class="addForm">
    <div class="typeBtns">
      ${TYPES.map(t=>`<button data-t="${t}" class="${t===addType?'on':''}" onclick="pickType('${t}')">${t}</button>`).join("")}
    </div>
    <div id="noteWrap" style="display:${addType==='אחר'?'block':'none'}">
      <input id="addNote" placeholder="מה האירוע? (למשל: החלפת צמיגים)">
    </div>
    <div>
      <div class="lbl">יעד ק"מ</div>
      <input id="addDueKm" inputmode="numeric" placeholder='למשל 60000 (נוכחי: ${fmt(v.km)})'>
    </div>
    <div>
      <div class="lbl">או תאריך יעד (לא חובה)</div>
      <input id="addDueDate" type="date">
    </div>
    <div>
      <div class="lbl">חזרה אוטומטית אחרי "בוצע"</div>
      <select onchange="pickRepeat(this)">
        <option value="none">ללא חזרה</option>
        <option value="km">כל X ק"מ</option>
        <option value="year">כל שנה (טסט)</option>
      </select>
      <div id="everyKmWrap" style="display:none;margin-top:8px">
        <input id="addEveryKm" inputmode="numeric" placeholder="למשל 15000">
      </div>
    </div>
    <div class="row">
      <button class="btn primary grow" onclick="submitAdd('${v.id}')">הוספה</button>
      <button class="btn ghost" onclick="addingFor=null;render()">ביטול</button>
    </div>
  </div>`;
}

function renderVehicles(){
  let h = '<div class="stack">';
  data.vehicles.forEach(v=>{
    let worst = "ok";
    v.events.forEach(ev=>{
      const l = status(ev, v.km).level;
      if(l==="overdue") worst = "overdue";
      else if(l==="warn" && worst!=="overdue") worst = "warn";
    });
    const open = expanded===v.id;
    h += `<div class="card">
      <div class="vhead" onclick="expanded=${open?'null':`'${v.id}'`};addingFor=null;render()">
        <div>
          <div class="name">${esc(v.name)}</div>
          <div class="info">${fmt(v.km)} ק"מ${v.kmDate?" · עודכן "+fmtDate(v.kmDate):""} · ${v.events.length} אירועים</div>
        </div>
        <div class="row">
          ${v.events.length?`<span class="badge b-${worst}">${LEVEL_TXT[worst]}</span>`:""}
          <span style="color:var(--sub);font-size:18px">${open?"▴":"▾"}</span>
        </div>
      </div>`;
    if(open){
      h += `<div class="vbody">
        <div class="row">
          <input id="km-${v.id}" inputmode="numeric" class="grow" placeholder='עדכון ק"מ (נוכחי: ${fmt(v.km)})'>
          <button class="btn primary" onclick="updateKm('${v.id}')">עדכון</button>
        </div>
        <div class="stack">${v.events.map(ev=>eventCardHTML(v, ev, false)).join("")}</div>
        ${addingFor===v.id ? addFormHTML(v) : `<button class="btn ghost full" onclick="openAdd('${v.id}')">+ הוספת טיפול / טסט / אחר</button>`}
        <button class="linkDel" onclick="removeVehicle('${v.id}')">מחיקת רכב מהמערכת</button>
      </div>`;
    }
    h += `</div>`;
  });
  h += `<div class="row" style="margin-top:4px">
    <input id="newVehicleName" class="grow" placeholder="שם רכב חדש (למשל: רענן 3)">
    <button class="btn ghost" onclick="addVehicle()">+ הוספה</button>
  </div></div>`;
  return h;
}

function renderWeekly(){
  let h = `<div class="stack">
    <div style="font-size:14px;color:var(--sub);line-height:1.5">מזינים את קריאת הק"מ של כל רכב ולוחצים שמירה בסוף. רכב שלא הוזן — לא ישתנה.</div>`;
  data.vehicles.forEach(v=>{
    h += `<div class="card weekCard">
      <div class="grow">
        <div style="font-weight:800">${esc(v.name)}</div>
        <div id="wkinfo-${v.id}" style="font-size:12.5px;color:var(--sub)">נוכחי: ${fmt(v.km)}${v.kmDate?" · "+fmtDate(v.kmDate):""}</div>
      </div>
      <input id="wk-${v.id}" inputmode="numeric" placeholder="${fmt(v.km)}"
        oninput="this.value=this.value.replace(/[^\\d]/g,'');
          const low=this.value!=='' && Number(this.value)<${v.km};
          const el=document.getElementById('wkinfo-${v.id}');
          el.className=''; el.style.fontSize='12.5px';
          el.style.color=low?'var(--red)':'var(--sub)';
          el.textContent=low?'⚠ נמוך מהקריאה הקודמת (${fmt(v.km)})':'נוכחי: ${fmt(v.km)}';">
    </div>`;
  });
  h += `<button class="btn primary full" style="padding:14px 0;font-size:16px;margin-top:4px" onclick="saveWeekly()">שמירת כל העדכונים</button></div>`;
  return h;
}

function render(){
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("on"));
  document.getElementById("tab-"+tab).classList.add("on");
  const app = document.getElementById("app");
  app.innerHTML = tab==="board" ? renderBoard() : tab==="vehicles" ? renderVehicles() : renderWeekly();
  let n = 0;
  data.vehicles.forEach(v=>v.events.forEach(ev=>{ if(status(ev,v.km).level!=="ok") n++; }));
  document.getElementById("alertDot").innerHTML = n>0 ? `<span class="dot">${n}</span>` : "";
}

render();
</script>
</body>
</html>
